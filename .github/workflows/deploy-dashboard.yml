# Deploy PM Agent Dashboard (docs/*.html) to gh-pages root
# Requires: repo Settings → Pages → Build from branch "gh-pages" / root.

name: Deploy PM Agent Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-dashboard-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: design/package-lock.json

      - name: Build design prototypes
        working-directory: design
        run: |
          npm ci
          npx vite build
        env:
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Prepare dashboard files
        run: |
          mkdir -p dashboard-dist/dashboard
          mkdir -p dashboard-dist/docs
          cp -r docs/* dashboard-dist/docs/
          cp -r design/dist/* dashboard-dist/
          cp docs/pm-agent-*.html dashboard-dist/dashboard/
          cp docs/dashboard-nav.js dashboard-dist/dashboard/ 2>/dev/null || true
          cp docs/manifest.json dashboard-dist/dashboard/ 2>/dev/null || true
          echo "Files to deploy:"
          ls -la dashboard-dist/

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dashboard-dist
          target-folder: .
          clean: true
