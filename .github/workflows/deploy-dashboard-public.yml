name: Deploy Public Dashboard to GHE Pages

on:
  push:
    branches: [main]
    paths:
      - 'design/main-public.tsx'
      - 'design/pm-agent-dashboard-public.tsx'
      - 'design/public.html'
      - 'design/vite.config.public.ts'
      - 'design/vite-plugin-forbidden-imports.ts'
      - 'design/tsconfig.public.json'
      - 'design/package.json'
      - 'design/package-lock.json'
      - 'design/components/**'
      - '.github/workflows/deploy-dashboard-public.yml'
  workflow_dispatch:

# Public bundle only. The forbidden-imports Vite plugin
# (design/vite-plugin-forbidden-imports.ts) hard-fails the build if any
# Pharos-derived data file or customer-attributable surface becomes
# reachable from main-public.tsx. The full localhost dashboard is never
# published.
permissions:
  contents: write

concurrency:
  group: deploy-dashboard-public
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build public bundle and publish to gh-pages
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: design/package-lock.json

      - name: Install dependencies
        working-directory: design
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build public bundle (with forbidden-imports guardrail)
        working-directory: design
        env:
          # Pages serves the repo at <pages-host>/<repo>/. If the repo is
          # not at the root, set VITE_BASE_PATH in repo Variables to
          # something like '/pm-agent-dashboard/'. Default './' works for
          # root-served Pages and for previews.
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH || './' }}
        run: npm run build:public

      - name: Sanity-check public bundle for forbidden strings
        working-directory: design
        run: |
          python3 - <<'PY'
          import glob, sys
          forbidden = [
              'VALUE_REALIZATION_IUMS',
              'TENANT_OPTIONS',
              'internal_usage_metrics_report_kafka',
              'morning-roundup-data',
          ]
          js_files = glob.glob('dashboard-public-dist/assets/*.js')
          if not js_files:
              print('No JS bundle found in dashboard-public-dist/assets/', file=sys.stderr)
              sys.exit(1)
          leaks = []
          for js in js_files:
              text = open(js, 'r', encoding='utf-8', errors='ignore').read()
              for needle in forbidden:
                  if needle in text:
                      leaks.append((js, needle))
          if leaks:
              for js, needle in leaks:
                  print(f'LEAK: {needle!r} found in {js}', file=sys.stderr)
              sys.exit(1)
          print('Public bundle clean: no forbidden strings detected.')
          PY

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: design/dashboard-public-dist
          publish_branch: gh-pages
          force_orphan: true
          commit_message: |
            Deploy public dashboard (Design System + Agent Flow)

            Source commit: ${{ github.sha }}
