# Build design/ and publish each run to gh-pages under preview/<UTC-timestamp>-<run_id>/
# Requires: repo Settings → Pages → Build from branch "gh-pages" / root.

name: Deploy design prototype preview

on:
  push:
    branches: [main]
    paths:
      - 'design/**'
      - '.github/workflows/deploy-design-preview.yml'
  workflow_dispatch:

concurrency:
  group: pages-preview-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: design/package-lock.json

      - name: Preview folder name (timestamp + run id)
        id: meta
        run: |
          TS=$(date -u +%Y%m%d-%H%M%S)
          SLUG="preview-${TS}-${{ github.run_id }}"
          echo "slug=${SLUG}" >> "$GITHUB_OUTPUT"

          PREFIX="${{ vars.VITE_PAGES_BASE }}"
          if [ -z "$PREFIX" ]; then
            BASE_PATH="/${{ github.event.repository.name }}/preview/${SLUG}/"
          else
            P="${PREFIX#/}"
            P="${P%/}"
            BASE_PATH="/${P}/preview/${SLUG}/"
          fi
          echo "vite_base_path=${BASE_PATH}" >> "$GITHUB_OUTPUT"

      - name: Install and build
        working-directory: design
        run: npm ci && npm run build
        env:
          VITE_BASE_PATH: ${{ steps.meta.outputs.vite_base_path }}

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: design/dist
          target-folder: preview/${{ steps.meta.outputs.slug }}
          clean: false

      - name: Job summary (preview path)
        run: |
          {
            echo "## Design prototype preview"
            echo ""
            echo "**Path:** \`preview/${{ steps.meta.outputs.slug }}/\`"
            echo ""
            echo "**Vite base used:** \`${{ steps.meta.outputs.vite_base_path }}\`"
            echo ""
            echo "Configure **Pages** and optional \`VITE_PAGES_BASE\` — see \`docs/gh-pages-preview.md\` in the repo."
          } >> "$GITHUB_STEP_SUMMARY"
