<script>
(function() {
  var el = document.getElementById('prototypes-data');
  if (!el) return;

  var data = JSON.parse(el.textContent);
  var isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.protocol === 'file:';
  var tbody = document.getElementById('proto-body');
  var savedSlugs = {};

  function fixPath(path) {
    if (!path) return '#';
    if (path.startsWith('http')) return path;
    if (path.startsWith('../')) return path;
    if (path.startsWith('pm-agent-')) return path;
    return '../' + path;
  }

  function routeForProto(p) {
    return p.route || p.slug;
  }

  function filesForProto(p) {
    if (Array.isArray(p.files) && p.files.length) return p.files.slice();
    var list = ['design/' + p.slug + '.tsx'];
    if (p.prd) list.push(p.prd);
    if (p.brief) list.push(p.brief);
    if (p.deck) list.push(p.deck);
    return list;
  }

  function applySavedState() {
    data.prototypes.forEach(function(p) {
      var tr = document.querySelector('tr[data-slug="' + p.slug + '"]');
      var btn = tr && tr.querySelector('.btn-save');
      if (!tr || !btn) return;
      if (savedSlugs[p.slug]) {
        tr.classList.add('saved-row');
        btn.classList.add('saved');
        btn.innerHTML = '&#9733;';
        btn.title = 'Saved — protected from /cleanup. Click to unsave.';
      } else {
        tr.classList.remove('saved-row');
        btn.classList.remove('saved');
        btn.innerHTML = '&#9734;';
        btn.title = 'Click to save — protects this prototype from /cleanup';
      }
    });
  }

  function toggleSave(slug) {
    var nowSaved = !savedSlugs[slug];
    var proto = data.prototypes.find(function(p) { return p.slug === slug; });
    if (!proto) return;

    savedSlugs[slug] = nowSaved;
    applySavedState();

    fetch('/api/save-prototype', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ slug: slug, files: filesForProto(proto), saved: nowSaved })
    }).catch(function(err) {
      console.error('Save failed:', err);
      savedSlugs[slug] = !nowSaved;
      applySavedState();
    });
  }

  data.prototypes.forEach(function(p) {
    var route = routeForProto(p);
    var protoHref = isLocal
      ? 'http://localhost:5199/' + route
      : '../preview/latest/#/' + route;

    var btns = '<a href="' + protoHref + '" target="_blank" class="btn-pill btn-pill-primary">Open</a>';
    if (p.prd) {
      btns += ' <a href="pm-agent-viewer.html?file=' + p.prd + '" target="_blank" class="btn-pill btn-pill-outline">PRD</a>';
    }
    if (p.brief) {
      btns += ' <a href="pm-agent-viewer.html?file=' + p.brief + '" target="_blank" class="btn-pill btn-pill-outline">Brief</a>';
    }
    if (p.deck) {
      btns += ' <a href="' + fixPath(p.deck) + '" target="_blank" class="btn-pill btn-pill-outline">Deck</a>';
    }

    var tr = document.createElement('tr');
    tr.setAttribute('data-slug', p.slug);
    tr.innerHTML =
      '<td><div class="proto-name">' + p.name + '</div>' + (p.category ? '<div class="proto-meta">' + p.category + '</div>' : '') + '</td>' +
      '<td class="proto-desc">' + p.description + '</td>' +
      '<td><div class="actions-cell">' + btns + '</div></td>' +
      '<td class="save-cell"><button class="btn-save" title="Loading...">&#9734;</button></td>';
    tbody.appendChild(tr);

    tr.querySelector('.btn-save').addEventListener('click', function() { toggleSave(p.slug); });
  });

  fetch('/api/saved-prototypes')
    .then(function(r) { return r.json(); })
    .then(function(resp) {
      (resp.saved || []).forEach(function(e) { savedSlugs[e.slug] = true; });
      applySavedState();
    })
    .catch(function() { applySavedState(); });
})();
</script>
