<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM Agent Dashboard — Football Results</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0b1f42;
  --water: #0075b4;
  --sky: #4a9fd4;
  --pencil: #f5a623;
  --paper: #f7f5f2;
  --laptop: #6b7a8d;
  --staple: #e2ddd7;
  --desk: #c4bdb3;
  --green: #22c55e;
  --red: #ef4444;
}
* { font-family: 'DM Sans', system-ui, sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--paper); color: var(--ink); }
.mono { font-family: 'JetBrains Mono', monospace; }

.dashboard-nav { position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(247,245,242,0.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--staple);padding:10px 24px;display:flex;align-items:center;gap:16px; }
.dashboard-brand { font-size:15px;font-weight:700;color:var(--ink);white-space:nowrap; }
.dashboard-tabs { display:flex;gap:4px; }
.dashboard-tab { padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;text-decoration:none;color:var(--laptop);transition:all 0.2s; }
.dashboard-tab:hover { background:var(--staple);color:var(--ink); }
.dashboard-tab.active { background:var(--ink);color:white; }
.dashboard-external { display:flex;gap:4px;margin-left:auto; }
.dashboard-ext-link { padding:4px 10px;border-radius:16px;font-size:11px;font-weight:600;text-decoration:none;color:var(--water);border:1px solid var(--staple);transition:all 0.2s;white-space:nowrap; }
.dashboard-ext-link:hover { border-color:var(--water);background:rgba(0,117,180,0.05); }

.container { max-width: 1400px; margin: 80px auto 40px; padding: 0 24px; }
.page-header { margin-bottom: 32px; }
.greeting { font-size: 32px; font-weight: 700; color: var(--ink); line-height: 1.2; }
.greeting-sub { font-size: 16px; font-weight: 400; color: var(--laptop); margin-top: 4px; }
.timestamp { font-size: 12px; color: var(--desk); margin-top: 8px; }

.section { background: white; border-radius: 12px; padding: 24px; margin-bottom: 24px; box-shadow: 0 1px 3px rgba(11,31,66,0.08); }
.section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid var(--staple); }
.section-title { font-size: 16px; font-weight: 700; color: var(--ink); }

.table-container { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; text-align: left; }
th { background: var(--staple); color: var(--ink); font-weight: 700; font-size: 12px; padding: 12px 16px; border-bottom: 2px solid var(--desk); text-transform: uppercase; letter-spacing: 0.05em; }
td { padding: 12px 16px; border-bottom: 1px solid var(--staple); font-size: 14px; color: var(--ink); }
tr:hover td { background: rgba(0,117,180,0.02); }

.score-badge { display: inline-flex; align-items: center; justify-content: center; background: var(--ink); color: white; padding: 4px 12px; border-radius: 4px; font-weight: 700; font-size: 14px; min-width: 60px; letter-spacing: 2px; }
.team-name { font-weight: 600; }
.pos-badge { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; background: var(--staple); color: var(--ink); border-radius: 50%; font-weight: 700; font-size: 12px; }

.grid-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}
@media (max-width: 1024px) {
  .grid-layout { grid-template-columns: 1fr; }
}

.empty-state { text-align: center; padding: 40px 20px; color: var(--laptop); }
.empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.3; }
.empty-text { font-size: 14px; }

</style>
</head>
<body>

<nav class="dashboard-nav">
  <div class="dashboard-brand">PM Agent Dashboard</div>
  <div class="dashboard-tabs">
    <a href="pm-agent-scorecard.html" class="dashboard-tab">Scorecard</a>
    <a href="pm-agent-architecture.html" class="dashboard-tab">Architecture</a>
    <a href="pm-agent-design-system.html" class="dashboard-tab">Design System</a>
    <a href="pm-agent-morning-roundup.html" class="dashboard-tab">Roundup</a>
    <a href="pm-agent-prototypes.html" class="dashboard-tab">Prototypes</a>
    <a href="pm-agent-football.html" class="dashboard-tab active">Football</a>
    <a href="pm-agent-adoption.html" class="dashboard-tab">Adoption</a>
  </div>
</nav>

<!-- Main Content -->
<div id="main-content" class="container">
  <div class="page-header">
    <div class="greeting">⚽ Premier League Results</div>
    <div class="greeting-sub" id="matchday-sub">Latest scores and standings.</div>
    <div class="timestamp" id="timestamp">Loading...</div>
  </div>

  <div class="grid-layout">
    <!-- Recent Results -->
    <div class="section">
      <div class="section-header">
        <div class="section-title">Recent Results</div>
      </div>
      <div class="table-container">
        <table id="results-table">
          <thead>
            <tr>
              <th>Date</th>
              <th style="text-align: right;">Home</th>
              <th style="text-align: center;">Score</th>
              <th>Away</th>
            </tr>
          </thead>
          <tbody id="results-body">
            <!-- Populated by JS -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- League Table -->
    <div class="section">
      <div class="section-header">
        <div class="section-title">Top 6 Standings</div>
      </div>
      <div class="table-container">
        <table id="standings-table">
          <thead>
            <tr>
              <th style="width: 40px; text-align: center;">Pos</th>
              <th>Team</th>
              <th style="text-align: center;">P</th>
              <th style="text-align: center;">W</th>
              <th style="text-align: center;">D</th>
              <th style="text-align: center;">L</th>
              <th style="text-align: center;">GD</th>
              <th style="text-align: center;">Pts</th>
            </tr>
          </thead>
          <tbody id="standings-body">
            <!-- Populated by JS -->
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Data (will be generated by /football-results skill) -->
<script id="football-data" type="application/json">{
  "generated": "2026-04-02T15:00:00Z",
  "matchday": "Matchday 31",
  "results": [
    {
      "date": "2026-03-22",
      "home": "Arsenal",
      "away": "Man City",
      "homeScore": 0,
      "awayScore": 2,
      "matchday": 31
    }
  ],
  "table": [
    {"pos": 1, "team": "Arsenal", "played": 31, "won": 21, "drawn": 4, "lost": 6, "gd": 42, "pts": 67},
    {"pos": 2, "team": "Man City", "played": 31, "won": 18, "drawn": 6, "lost": 7, "gd": 35, "pts": 60},
    {"pos": 3, "team": "Man United", "played": 31, "won": 16, "drawn": 7, "lost": 8, "gd": 22, "pts": 55},
    {"pos": 4, "team": "Aston Villa", "played": 31, "won": 15, "drawn": 8, "lost": 8, "gd": 18, "pts": 53},
    {"pos": 5, "team": "Liverpool", "played": 31, "won": 15, "drawn": 7, "lost": 9, "gd": 25, "pts": 52},
    {"pos": 6, "team": "Newcastle", "played": 31, "won": 14, "drawn": 8, "lost": 9, "gd": 15, "pts": 50}
  ]
}</script>

<!-- Main JavaScript -->
<script>
(function() {
  try {
    const data = JSON.parse(document.getElementById('football-data').textContent);
    
    // Update timestamp
    const generated = new Date(data.generated);
    const now = new Date();
    const minutesAgo = Math.floor((now - generated) / (1000 * 60));
    const hoursAgo = Math.floor(minutesAgo / 60);
    let timeStr = '';
    if (minutesAgo < 1) timeStr = 'Just now';
    else if (minutesAgo < 60) timeStr = `${minutesAgo} min${minutesAgo > 1 ? 's' : ''} ago`;
    else if (hoursAgo < 24) timeStr = `${hoursAgo} hour${hoursAgo > 1 ? 's' : ''} ago`;
    else {
      const daysAgo = Math.floor(hoursAgo / 24);
      timeStr = `${daysAgo} day${daysAgo > 1 ? 's' : ''} ago`;
    }
    document.getElementById('timestamp').textContent = `Last updated: ${timeStr} (${generated.toLocaleString()})`;
    
    if (data.matchday) {
      document.getElementById('matchday-sub').textContent = `Latest scores and standings for ${data.matchday}.`;
    }

    // Render Results
    const resultsBody = document.getElementById('results-body');
    if (data.results && data.results.length > 0) {
      const resultsHtml = data.results.map(match => {
        return `
          <tr>
            <td style="color: var(--laptop); font-size: 13px;">${match.date}</td>
            <td style="text-align: right;" class="team-name">${match.home}</td>
            <td style="text-align: center;">
              <span class="score-badge">${match.homeScore} - ${match.awayScore}</span>
            </td>
            <td class="team-name">${match.away}</td>
          </tr>
        `;
      }).join('');
      resultsBody.innerHTML = resultsHtml;
    } else {
      resultsBody.innerHTML = '<tr><td colspan="4"><div class="empty-state"><div class="empty-icon">⚽</div><div class="empty-text">No recent results found. Run /football-results to fetch data.</div></div></td></tr>';
    }

    // Render Standings
    const standingsBody = document.getElementById('standings-body');
    if (data.table && data.table.length > 0) {
      const standingsHtml = data.table.map(team => {
        return `
          <tr>
            <td style="text-align: center;"><span class="pos-badge">${team.pos}</span></td>
            <td class="team-name">${team.team}</td>
            <td style="text-align: center;">${team.played}</td>
            <td style="text-align: center;">${team.won}</td>
            <td style="text-align: center;">${team.drawn}</td>
            <td style="text-align: center;">${team.lost}</td>
            <td style="text-align: center; color: var(--laptop);">${team.gd > 0 ? '+' : ''}${team.gd}</td>
            <td style="text-align: center; font-weight: 700; color: var(--water);">${team.pts}</td>
          </tr>
        `;
      }).join('');
      standingsBody.innerHTML = standingsHtml;
    } else {
      standingsBody.innerHTML = '<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">🏆</div><div class="empty-text">No standings found. Run /football-results to fetch data.</div></div></td></tr>';
    }
    
  } catch (err) {
    document.body.innerHTML += `<div style="padding: 40px; text-align: center; color: #ef4444;">Error: ${err.message}<br>Run /football-results in Cursor to generate data.</div>`;
  }
})();
</script>
</body>
</html>
